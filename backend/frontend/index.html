<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Valorant Match History Tracker</title>
  <style>
    body { font-family: sans-serif; background: #181818; color: #fff; padding: 2rem; }
    .container { max-width: 400px; margin: auto; background: #222; padding: 2rem; border-radius: 8px; }
    input, button { width: 100%; margin: 0.5rem 0; padding: 0.5rem; border-radius: 4px; border: none; }
    button { background: #ff4655; color: #fff; font-weight: bold; cursor: pointer; }
    .error { color: #ff4655; margin-top: 1rem; }
    ul { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Valorant Match History Tracker</h2>
    <input id="username" placeholder="Riot Username (e.g. Her Jett)" />
    <input id="tag" placeholder="Tag (e.g. AERO)" />
    <button onclick="fetchHistory()">Fetch Match History</button>
    <div id="error" class="error"></div>
    <ul id="matches"></ul>
  </div>
  <script>
    async function fetchHistory() {
      document.getElementById('error').textContent = '';
      document.getElementById('matches').innerHTML = '';
      const username = document.getElementById('username').value.trim();
      const tag = document.getElementById('tag').value.trim();
      if (!username || !tag) {
        document.getElementById('error').textContent = 'Please enter both username and tag.';
        return;
      }
      try {
        const res = await fetch(`https://valorant-tracker-te76.onrender.com/api/match-history/${encodeURIComponent(username)}/${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error) {
          document.getElementById('error').textContent = data.error;
        } else if (!data.matches || data.matches.length === 0) {
          document.getElementById('error').textContent = 'No matches found.';
        } else {
          data.matches.forEach(match => {
            const li = document.createElement('li');
            li.textContent = `${match.metadata?.mapName || 'Unknown Map'} - ${match.stats?.kills || 0} Kills`;
            document.getElementById('matches').appendChild(li);
          });
        }
      } catch (err) {
        document.getElementById('error').textContent = 'Failed to fetch match history (network error).';
      }
    }
  </script>
</body>
</html>
